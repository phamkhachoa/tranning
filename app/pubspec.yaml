version: 2.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_appauth: ^8.0.3
  flutter_riverpod: ^2.6.0

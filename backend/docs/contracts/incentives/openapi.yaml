openapi: 3.1.0
info:
  title: CourseFlow Generic Incentive API
  version: 2.0.0-contract.2t
  summary: Portable promotion, coupon, reservation, redemption and retention APIs.
  description: >
    Static OpenAPI contract for the generic incentive platform. The service is not LMS-specific:
    source applications submit generic transaction facts and apply returned effects in their own
    domain. The gateway alias `/api/admin/v1/incentives/**` is for operator traffic. Runtime
    `/internal/incentives/**` endpoints are service-to-service only and are not exposed as browser
    `/api/v1/incentives/**` routes; source services or a BFF must build trusted facts and call them
    with internal JWT service tokens.
servers:
  - url: http://promotion-service:8080
    description: Internal Docker network.
  - url: http://localhost:28080
    description: Local API gateway.
tags:
  - name: Contract
  - name: Applications
  - name: Campaigns
  - name: Campaign Versions
  - name: Coupons
  - name: Runtime
  - name: Reservations
  - name: Redemptions
  - name: Reconciliation
  - name: Retention
  - name: Audit
security:
  - internalJwt: []
paths:
  /internal/incentives/catalog:
    get:
      tags: [Contract]
      operationId: incentiveCatalog
      summary: Describe supported rules, actions, effects, reason codes and idempotency.
      responses:
        "200":
          description: Incentive catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncentiveCatalog"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/applications:
    get:
      tags: [Applications]
      operationId: listIncentiveApplications
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApplicationId"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Application list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Applications]
      operationId: createIncentiveApplication
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationRequest"
      responses:
        "200":
          description: Created application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/applications/{applicationUuid}:
    patch:
      tags: [Applications]
      operationId: updateIncentiveApplication
      parameters:
        - $ref: "#/components/parameters/ApplicationUuid"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationRequest"
      responses:
        "200":
          description: Updated application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/applications/{applicationUuid}/status:
    patch:
      tags: [Applications]
      operationId: updateIncentiveApplicationStatus
      parameters:
        - $ref: "#/components/parameters/ApplicationUuid"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusChangeRequest"
      responses:
        "200":
          description: Updated application status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/applications/{applicationUuid}/client-bindings:
    post:
      tags: [Applications]
      operationId: upsertIncentiveApplicationClientBinding
      parameters:
        - $ref: "#/components/parameters/ApplicationUuid"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationClientBindingRequest"
      responses:
        "200":
          description: Created or updated client binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationClientBinding"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns:
    get:
      tags: [Campaigns]
      operationId: listIncentiveCampaigns
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApplicationId"
      responses:
        "200":
          description: Campaign list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Campaigns]
      operationId: createIncentiveCampaign
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        "200":
          description: Created campaign shell and initial draft version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}:
    get:
      tags: [Campaigns]
      operationId: getIncentiveCampaign
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Campaign detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/status:
    patch:
      tags: [Campaigns]
      operationId: updateIncentiveCampaignStatus
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusChangeRequest"
      responses:
        "200":
          description: Updated campaign status. Publishing must use version workflow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/versions:
    get:
      tags: [Campaign Versions]
      operationId: listIncentiveCampaignVersions
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Campaign versions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignVersion"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Campaign Versions]
      operationId: createIncentiveCampaignDraftVersion
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Created draft version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignVersion"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaign-versions/review-queue:
    get:
      tags: [Campaign Versions]
      operationId: listCampaignVersionReviewQueue
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApplicationId"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Versions awaiting review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignVersionReviewQueue"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/versions/{versionNumber}:
    get:
      tags: [Campaign Versions]
      operationId: getIncentiveCampaignVersion
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/VersionNumber"
      responses:
        "200":
          description: Immutable campaign version snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignVersionDetail"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/versions/{versionNumber}/draft:
    patch:
      tags: [Campaign Versions]
      operationId: updateIncentiveCampaignVersionDraft
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/VersionNumber"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignVersionDraftRequest"
      responses:
        "200":
          description: Updated editable draft snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignVersionDetail"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/versions/{versionNumber}/validation:
    get:
      tags: [Campaign Versions]
      operationId: validateIncentiveCampaignVersion
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/VersionNumber"
      responses:
        "200":
          description: Publish readiness blockers and warnings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignVersionValidation"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/versions/{leftVersion}/diff:
    get:
      tags: [Campaign Versions]
      operationId: diffIncentiveCampaignVersions
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - name: leftVersion
          in: path
          required: true
          schema:
            type: integer
        - name: rightVersion
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Canonical version diff.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignVersionDiff"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/versions/{versionNumber}/rollback:
    post:
      tags: [Campaign Versions]
      operationId: rollbackIncentiveCampaignVersion
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/VersionNumber"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackCampaignVersionRequest"
      responses:
        "200":
          description: New draft generated from a published or superseded snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignVersionDetail"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/versions/{versionNumber}/submit:
    post:
      tags: [Campaign Versions]
      operationId: submitIncentiveCampaignVersion
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/VersionNumber"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        $ref: "#/components/requestBodies/OptionalTransition"
      responses:
        "200":
          $ref: "#/components/responses/CampaignVersionResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/versions/{versionNumber}/approve:
    post:
      tags: [Campaign Versions]
      operationId: approveIncentiveCampaignVersion
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/VersionNumber"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        $ref: "#/components/requestBodies/OptionalTransition"
      responses:
        "200":
          $ref: "#/components/responses/CampaignVersionResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/versions/{versionNumber}/reject:
    post:
      tags: [Campaign Versions]
      operationId: rejectIncentiveCampaignVersion
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/VersionNumber"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        $ref: "#/components/requestBodies/OptionalTransition"
      responses:
        "200":
          $ref: "#/components/responses/CampaignVersionResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/campaigns/{campaignId}/versions/{versionNumber}/publish:
    post:
      tags: [Campaign Versions]
      operationId: publishIncentiveCampaignVersion
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/VersionNumber"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        $ref: "#/components/requestBodies/OptionalTransition"
      responses:
        "200":
          $ref: "#/components/responses/CampaignVersionResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons:
    get:
      tags: [Coupons]
      operationId: listIncentiveCoupons
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApplicationId"
        - $ref: "#/components/parameters/CampaignIdQuery"
        - $ref: "#/components/parameters/Status"
        - name: holderProfileId
          in: query
          schema:
            type: string
        - name: code
          in: query
          description: Raw coupon code lookup value. The service stores only masks and fingerprints.
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Coupon list with masked codes only.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Coupons]
      operationId: createIncentiveCoupon
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCouponRequest"
      responses:
        "200":
          description: Created coupon. Response never contains raw code or fingerprint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/learner/coupons:
    get:
      tags: [Coupons]
      operationId: listLearnerIncentiveCoupons
      summary: Service-to-service learner coupon wallet projection.
      description: >
        Read-only projection for source BFFs such as enrollment-service. The response is scoped to
        one profile and returns masked coupon display fields only; raw coupon codes, normalized
        fingerprints and private metadata are never exposed.
      security:
        - internalJwt:
            - internal:promotion:evaluate
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: applicationId
          in: query
          required: true
          schema:
            type: string
        - name: profileId
          in: query
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Masked learner coupon wallet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearnerCouponWallet"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/storage-inventory:
    get:
      tags: [Coupons]
      operationId: getCouponStorageInventory
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApplicationId"
        - $ref: "#/components/parameters/CampaignIdQuery"
        - name: activeOnly
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Coupon storage format inventory for migration readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponStorageInventory"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons:import-dry-run:
    post:
      tags: [Coupons]
      operationId: dryRunCouponCsvImport
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CouponImportDryRunMultipartRequest"
      responses:
        "200":
          description: Non-destructive CSV import dry-run. Report contains masks only.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponImportDryRunResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/import-dry-runs:
    get:
      tags: [Coupons]
      operationId: listCouponCsvImportDryRuns
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: applicationId
          in: query
          required: true
          schema:
            type: string
        - name: campaignId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [COMPLETED]
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Read-only coupon import dry-run history. Contains masked/hash/counter data only.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponImportDryRunQueryResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/import-dry-runs/{dryRunId}:
    get:
      tags: [Coupons]
      operationId: getCouponCsvImportDryRun
      parameters:
        - name: dryRunId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Previously persisted dry-run report with masked row outcomes only.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponImportDryRunResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/import-dry-runs/{dryRunId}/issue-export:
    get:
      tags: [Coupons]
      operationId: exportCouponCsvImportDryRunIssues
      parameters:
        - name: dryRunId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: rowStatus
          in: query
          required: false
          schema:
            type: string
            enum: [INVALID, VALID, ALL]
            default: INVALID
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Masked CSV issue export generated from persisted dry-run rows. Content never contains raw coupon code, fingerprint, normalized code, or idempotency key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponImportIssueExport"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/import-dry-runs/{dryRunId}/approvals:
    post:
      tags: [Coupons]
      operationId: requestCouponCsvImportApproval
      parameters:
        - name: dryRunId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CouponImportApprovalMultipartRequest"
      responses:
        "200":
          description: Pending maker/checker approval for a commit-ready coupon import dry-run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponImportApprovalResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/import-approvals:
    get:
      tags: [Coupons]
      operationId: listCouponCsvImportApprovals
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: applicationId
          in: query
          required: true
          schema:
            type: string
        - name: campaignId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING_APPROVAL, APPROVED, REJECTED, EXECUTED]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Coupon import approval queue/history.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CouponImportApprovalResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/import-approvals/{approvalId}:
    get:
      tags: [Coupons]
      operationId: getCouponCsvImportApproval
      parameters:
        - name: approvalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Coupon import approval detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponImportApprovalResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/import-operations:
    get:
      tags: [Coupons]
      operationId: listCouponCsvImportOperations
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: applicationId
          in: query
          required: true
          schema:
            type: string
        - name: campaignId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: approvalId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: dryRunId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [SUCCEEDED]
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Read-only coupon import commit operation history. No raw CSV, coupon code, request hash, or idempotency key hash is exposed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponImportOperationQueryResponse"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/import-operations/{importId}:
    get:
      tags: [Coupons]
      operationId: getCouponCsvImportOperation
      parameters:
        - name: importId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Coupon import operation detail. Contains operational counters and audit identifiers only.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponImportOperation"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/import-operations/{importId}/export:
    get:
      tags: [Coupons]
      operationId: exportCouponCsvImportOperation
      parameters:
        - name: importId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Audit-safe coupon import operation CSV export. The CSV contains operation counters and identifiers, not raw coupon codes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponImportOperationExport"
        default:
          $ref: "#/components/responses/Error"
  /internal/incentives/coupons/import-approvals/{approvalId}:approve:
    post:

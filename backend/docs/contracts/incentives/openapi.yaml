components:
  securitySchemes:
    internalJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Internal JWT minted by the identity-token-converter flow. Service actors must carry the
        relevant `internal:promotion:<operation>` scope and must be bound to the incentive application.
  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
    CorrelationIdRequired:
      name: X-Correlation-Id
      in: header
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 160
      description: >
        Canonical retry key for trusted mutations. Same key plus same normalized request hash replays
        the stored response; same key plus different payload returns conflict. Body `idempotencyKey`
        fields remain compatibility fallbacks during migration.
    TenantId:
      name: tenantId
      in: query
      required: false
      schema:
        type: string
    ApplicationId:
      name: applicationId
      in: query
      required: false
      schema:
        type: string
    Status:
      name: status
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
    ApplicationUuid:
      name: applicationUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CampaignId:
      name: campaignId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CampaignIdQuery:
      name: campaignId
      in: query
      required: false
      schema:
        type: string
        format: uuid
    CouponId:
      name: couponId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReservationId:
      name: reservationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RedemptionId:
      name: redemptionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionNumber:
      name: versionNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  requestBodies:
    OptionalTransition:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              note:
                type: string
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    CampaignVersionResponse:
      description: Campaign version transition response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CampaignVersion"
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      additionalProperties: true
      required: [statusCode, title, detail, fieldErrors]
      properties:
        statusCode:
          type: string
          example: 400 BAD_REQUEST
        title:
          type: string
          example: Bad Request
        detail:
          type: string
        fieldErrors:
          type: array
          items:
            type: string
    Application:
      type: object
      additionalProperties: true
      required: [id, tenantId, applicationId, name, status]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
        applicationId:
          type: string
        name:
          type: string
        status:
          type: string
    ApplicationClientBinding:
      type: object
      additionalProperties: true
      required: [id, clientId, status, allowedOperations]
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
        status:
          type: string
        allowedOperations:
          type: array
          items:
            type: string
    CreateApplicationRequest:
      type: object
      required: [tenantId, applicationId, name]
      properties:
        tenantId:
          type: string
        applicationId:
          type: string
        name:
          type: string
        status:
          type: string
        allowedClientIds:
          type: array
          items:
            type: string
    UpdateApplicationRequest:
      type: object
      properties:
        name:
          type: string
        allowedClientIds:
          type: array
          items:
            type: string
    StatusChangeRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
        note:
          type: string
    CreateApplicationClientBindingRequest:
      type: object
      required: [clientId]
      properties:
        clientId:
          type: string
        status:
          type: string
        allowedOperations:
          type: array
          items:
            type: string
    Campaign:
      type: object
      additionalProperties: true
      required: [id, tenantId, applicationId, code, name, status]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
        applicationId:
          type: string
        code:
          type: string
        name:
          type: string
        status:
          type: string
        draftVersion:
          type: integer
        publishedVersion:
          type: integer
    CampaignVersion:
      type: object
      additionalProperties: true
      required: [campaignId, versionNumber, versionStatus]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        versionNumber:
          type: integer
        versionStatus:
          type: string
        activeSnapshot:
          type: boolean
        createdBy:
          type: ["string", "null"]
        submittedBy:
          type: ["string", "null"]
        reviewedBy:
          type: ["string", "null"]
        publishedBy:
          type: ["string", "null"]
        reviewNote:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        submittedAt:
          type: ["string", "null"]
          format: date-time
        reviewedAt:
          type: ["string", "null"]
          format: date-time
        publishedAt:
          type: ["string", "null"]
          format: date-time
    CampaignVersionDetail:
      allOf:
        - $ref: "#/components/schemas/CampaignVersion"
        - type: object
          additionalProperties: true
    CampaignVersionReviewQueue:
      type: object
      required: [items, limit, hasMore]
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
            required: [version, tenantId, applicationId, campaignCode, campaignName, blockerCount, warningCount, publishable]
            properties:
              version:
                $ref: "#/components/schemas/CampaignVersion"
              tenantId:
                type: string
              applicationId:
                type: string
              campaignCode:
                type: string
              campaignName:
                type: string
              blockerCount:
                type: integer
              warningCount:
                type: integer
              publishable:
                type: boolean
        limit:
          type: integer
        hasMore:
          type: boolean
    UpdateCampaignVersionDraftRequest:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        incentiveType:
          type: string
        startsAt:
          type: ["string", "null"]
          format: date-time
        endsAt:
          type: ["string", "null"]
          format: date-time
        priority:
          type: integer
        exclusive:
          type: boolean
        stackable:
          type: boolean
        couponRequired:
          type: boolean
        matchPolicy:
          type: string
          enum: [ALL, ANY]
        currency:
          type: ["string", "null"]
        rules:
          type: array
          items:
            $ref: "#/components/schemas/RuleSpec"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/ActionSpec"
        maxRedemptions:
          type: ["integer", "null"]
        maxRedemptionsPerProfile:
          type: ["integer", "null"]
    ValidationMessage:
      type: object
      required: [severity, code, field, message]
      properties:
        severity:
          type: string
        code:
          type: string
        field:
          type: ["string", "null"]
        message:
          type: string
    CampaignVersionValidation:
      type: object
      required: [campaignId, versionNumber, publishable, blockers, warnings]
      properties:
        campaignId:
          type: string
          format: uuid
        versionNumber:
          type: integer
        publishable:
          type: boolean
        blockers:
          type: array
          items:
            $ref: "#/components/schemas/ValidationMessage"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationMessage"
    CampaignVersionDiff:
      type: object
      required: [campaignId, leftVersion, rightVersion, changes]
      properties:
        campaignId:
          type: string
          format: uuid
        leftVersion:
          type: integer
        rightVersion:
          type: integer
        changes:
          type: array
          items:
            type: object
            required: [field, leftValue, rightValue]
            properties:
              field:
                type: string
              leftValue: {}
              rightValue: {}
    RollbackCampaignVersionRequest:
      type: object
      properties:
        note:
          type: string
    CreateCampaignRequest:
      type: object
      required: [tenantId, applicationId, code, name, actions]
      properties:
        tenantId:
          type: string
        applicationId:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
        incentiveType:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        priority:
          type: integer
        exclusive:
          type: boolean
        stackable:
          type: boolean
        couponRequired:
          type: boolean
        matchPolicy:
          type: string
          enum: [ALL, ANY]
        currency:
          type: string
        rules:
          type: array
          items:
            $ref: "#/components/schemas/RuleSpec"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/ActionSpec"
        maxRedemptions:
          type: integer
        maxRedemptionsPerProfile:
          type: integer
    RuleSpec:
      type: object
      required: [type, schemaVersion]
      properties:
        type:
          type: string
        schemaVersion:
          type: integer
        parameters:
          type: object
          additionalProperties: true
    ActionSpec:
      type: object
      required: [type, schemaVersion]
      properties:
        type:
          type: string
        schemaVersion:
          type: integer
        parameters:
          type: object
          additionalProperties: true
    Coupon:
      type: object
      additionalProperties: false
      required: [id, campaignId, code, normalizedCode, codeMask, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        code:
          type: ["string", "null"]
          description: DTO compatibility field. Runtime returns a mask, never the raw coupon credential.
        normalizedCode:
          type: ["string", "null"]
          description: DTO compatibility field. Runtime returns null; stored fingerprint is not exposed.
        codeMask:
          type: string
          description: Mask only. Raw code and fingerprint are never returned.
        status:
          type: string
          enum: [ACTIVE, PAUSED, EXPIRED, VOID, REDEEMED]
        holderProfileId:
          type: ["string", "null"]
        startsAt:
          type: ["string", "null"]
          format: date-time
        expiresAt:
          type: ["string", "null"]
          format: date-time
        maxRedemptions:
          type: ["integer", "null"]
        maxRedemptionsPerProfile:
          type: ["integer", "null"]
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LearnerCoupon:
      type: object
      additionalProperties: false
      required: [couponId, campaignId, campaignCode, campaignName, codeMask, status, walletStatus, message]
      properties:
        couponId:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        campaignCode:
          type: string
        campaignName:
          type: string
        codeMask:
          type: string
          description: Mask only. Raw coupon credential and fingerprint are never returned.
        status:
          type: string
          enum: [ACTIVE, PAUSED, EXPIRED, VOID, REDEEMED]
        walletStatus:
          type: string
          enum: [AVAILABLE, UPCOMING, USED, EXPIRED, PAUSED, VOID, UNAVAILABLE]
        startsAt:
          type: ["string", "null"]
          format: date-time
        expiresAt:
          type: ["string", "null"]
          format: date-time
        redemptionId:
          type: ["string", "null"]
          format: uuid
        redeemedAt:
          type: ["string", "null"]
          format: date-time
        message:
          type: string
    LearnerCouponWallet:
      type: object
      additionalProperties: false
      required: [tenantId, applicationId, profileId, generatedAt, availableCount, expiringSoonCount, usedCount, expiredCount, items]
      properties:
        tenantId:
          type: string
        applicationId:
          type: string
        profileId:
          type: string
        generatedAt:
          type: string
          format: date-time
        availableCount:
          type: integer
          minimum: 0
        expiringSoonCount:
          type: integer
          minimum: 0
        usedCount:
          type: integer
          minimum: 0
        expiredCount:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: "#/components/schemas/LearnerCoupon"
    CreateCouponRequest:
      type: object
      required: [campaignId, code]
      properties:
        campaignId:
          type: string
          format: uuid
        code:
          type: string
          writeOnly: true
          description: Raw coupon credential accepted only in mutation/lookup requests.
        holderProfileId:
          type: string
        startsAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        maxRedemptions:
          type: integer
        maxRedemptionsPerProfile:
          type: integer
        metadata:
          type: object
          additionalProperties: true
    UpdateCouponStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACTIVE, PAUSED, EXPIRED, VOID]
        reason:
          type: string
    GenerateCouponsRequest:
      type: object
      required: [campaignId, quantity]
      properties:
        campaignId:
          type: string
          format: uuid
        prefix:
          type: string
        quantity:
          type: integer
          minimum: 1
          maximum: 500
        codeLength:
          type: integer
          minimum: 6
          maximum: 32
        holderProfileId:
          type: string
        startsAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        maxRedemptions:
          type: integer
        maxRedemptionsPerProfile:
          type: integer
        metadata:

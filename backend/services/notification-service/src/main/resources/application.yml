server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: notification-service
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5432/cf_notification}
    username: ${NOTIFICATION_DB_USERNAME:courseflow}
    password: ${NOTIFICATION_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
courseflow:
  enrollment:
    base-url: ${ENROLLMENT_BASE_URL:http://enrollment-service:8080}
  notification:
    delivery:
      mode: ${NOTIFICATION_DELIVERY_MODE:log}
      webhook-url: ${NOTIFICATION_DELIVERY_WEBHOOK_URL:}
      retry:
        enabled: ${NOTIFICATION_DELIVERY_RETRY_ENABLED:true}
        interval-ms: ${NOTIFICATION_DELIVERY_RETRY_INTERVAL_MS:60000}
        max-attempts: ${NOTIFICATION_DELIVERY_RETRY_MAX_ATTEMPTS:5}
        batch-size: ${NOTIFICATION_DELIVERY_RETRY_BATCH_SIZE:100}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

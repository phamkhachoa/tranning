server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: discovery-service
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8080/eureka/}
  server:
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION_ENABLED:true}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: chat-service
  data:
    mongodb:
      uri: ${CHAT_MONGO_URI:mongodb://localhost:27017/cf_chat}
      auto-index-creation: true

courseflow:
  chat:
    # Training mode accepts STOMP Authorization headers like:
    # Authorization: Training 4:student@courseflow.local:STUDENT
    training-auth-enabled: ${COURSEFLOW_CHAT_TRAINING_AUTH_ENABLED:${COURSEFLOW_TRAINING_AUTH_BYPASS:true}}
    token-converter-uri: ${TOKEN_CONVERTER_URI:http://localhost:8180}
    token-converter-client-id: ${COURSEFLOW_STS_CLIENT_ID:${spring.application.name:chat-service}}
    token-converter-client-secret: ${COURSEFLOW_STS_CLIENT_SECRET:}
    internal-jwt-audience: ${COURSEFLOW_INTERNAL_JWT_AUDIENCE:courseflow-services}
    websocket:
      allowed-origins: ${CHAT_WS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:28080,http://localhost:8080}
  security:
    internal-jwt:
      algorithm: ${COURSEFLOW_INTERNAL_JWT_ALGORITHM:HS256}
      secret: ${COURSEFLOW_INTERNAL_JWT_SECRET:courseflow-training-internal-jwt-secret-32bytes}
      verification-mode: ${COURSEFLOW_INTERNAL_JWT_VERIFICATION_MODE:local}
      audience: ${COURSEFLOW_INTERNAL_JWT_AUDIENCE:courseflow-services}
      service-token-mode: ${COURSEFLOW_INTERNAL_SERVICE_TOKEN_MODE:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

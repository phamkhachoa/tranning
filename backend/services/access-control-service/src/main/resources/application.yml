server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: access-control-service
  datasource:
    url: ${ACCESS_CONTROL_DB_URL:jdbc:postgresql://localhost:5432/cf_access_control}
    username: ${ACCESS_CONTROL_DB_USERNAME:courseflow}
    password: ${ACCESS_CONTROL_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
courseflow:
  access-control:
    audit-authz-allowed: ${ACCESS_CONTROL_AUDIT_AUTHZ_ALLOWED:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

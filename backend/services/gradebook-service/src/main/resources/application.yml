server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: gradebook-service
  datasource:
    url: ${GRADEBOOK_DB_URL:jdbc:postgresql://localhost:5432/cf_gradebook}
    username: ${GRADEBOOK_DB_USERNAME:courseflow}
    password: ${GRADEBOOK_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: gradebook-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
courseflow:
  entitlement:
    course-service-url: ${COURSE_SERVICE_URL:http://course-service:8080}
    enrollment-service-url: ${ENROLLMENT_SERVICE_URL:http://enrollment-service:8080}

server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: enrollment-service
  datasource:
    url: ${ENROLLMENT_DB_URL:jdbc:postgresql://localhost:5432/cf_enrollment}
    username: ${ENROLLMENT_DB_USERNAME:courseflow}
    password: ${ENROLLMENT_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: enrollment-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
courseflow:
  entitlement:
    course-service-url: ${COURSE_SERVICE_URL:http://course-service:8080}
    enrollment-service-url: ${ENROLLMENT_SERVICE_URL:http://enrollment-service:8080}
  enrollment:
    default-capacity: ${ENROLLMENT_DEFAULT_CAPACITY:100}
    promotion-service-url: ${PROMOTION_SERVICE_URL:http://localhost:0}
    promotion-commit-retry:
      enabled: ${ENROLLMENT_PROMOTION_COMMIT_RETRY_ENABLED:true}
      fixed-delay-ms: ${ENROLLMENT_PROMOTION_COMMIT_RETRY_FIXED_DELAY_MS:60000}
      batch-size: ${ENROLLMENT_PROMOTION_COMMIT_RETRY_BATCH_SIZE:25}
    incentives:
      enabled: ${ENROLLMENT_INCENTIVES_ENABLED:false}
      tenant-id: ${ENROLLMENT_INCENTIVES_TENANT_ID:courseflow}
      application-id: ${ENROLLMENT_INCENTIVES_APPLICATION_ID:lms}
      currency: ${ENROLLMENT_INCENTIVES_CURRENCY:USD}
      default-list-price: ${ENROLLMENT_INCENTIVES_DEFAULT_LIST_PRICE:100.00}
      price-source: ${ENROLLMENT_INCENTIVES_PRICE_SOURCE:CONFIG_DEFAULT}
      allow-config-default-price: ${ENROLLMENT_INCENTIVES_ALLOW_CONFIG_DEFAULT_PRICE:false}

groups:
  - name: courseflow-training-service-health
    rules:
      - alert: CourseFlowTrainingServiceDown
        expr: up{job=~"courseflow-.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CourseFlow training scrape target is down"
          description: "{{ $labels.job }} target {{ $labels.instance }} has been unreachable for 2 minutes."

      - alert: CourseFlowTrainingNoScrapeTargets
        expr: count(up{job=~"courseflow-.*"}) == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "No CourseFlow training metrics targets are being scraped"
          description: "Prometheus has no active CourseFlow targets. Check compose profile, network and actuator exposure."

      - alert: CourseFlowTrainingHttp5xxElevated
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 1)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CourseFlow training HTTP 5xx rate is elevated"
          description: "More than 5% of observed HTTP requests are 5xx for 5 minutes."

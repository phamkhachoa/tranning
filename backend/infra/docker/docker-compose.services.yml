x-service-common: &service-common
  restart: unless-stopped
  expose:
    - "8080"
  environment:
    <<: *service-env
  depends_on:
    discovery-service:
      condition: service_started
    postgres:
      condition: service_healthy
    kafka:
      condition: service_started
    mongo:
      condition: service_started
    redis:
      condition: service_started
    elasticsearch:
      condition: service_started
    minio-setup:
      condition: service_completed_successfully

services:
  discovery-service:
    restart: unless-stopped
    build:
      <<: *build-common
      args:
        MODULE: services/discovery-service
    environment:
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8080/eureka/
    expose:
      - "8080"

  api-gateway:
    <<: *service-common
    build:
      <<: *build-common
      args:
        MODULE: services/api-gateway
    environment:
      <<: *service-env
      TOKEN_CONVERTER_URI: http://identity-token-converter-service:8080
      TOKEN_CONVERTER_MODE: ${TOKEN_CONVERTER_MODE:-required}
    ports:
      - "${API_GATEWAY_PORT:-28080}:8080"

  access-control-service:
    <<: *service-common
    build:
      <<: *build-common
      args:
        MODULE: services/access-control-service

  user-management-service:
    <<: *service-common
    build:
      <<: *build-common
      args:
        MODULE: services/user-management-service

  identity-token-converter-service:
    <<: *service-common
    build:
      <<: *build-common
      args:
        MODULE: services/identity-token-converter-service
    environment:
      <<: *service-env
      COURSEFLOW_INTERNAL_SERVICE_TOKEN_MODE: local

  organization-service:

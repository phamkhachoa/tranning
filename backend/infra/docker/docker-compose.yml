name: courseflow-v2-backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: courseflow-postgres
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    environment:
      POSTGRES_USER: courseflow
      POSTGRES_PASSWORD: courseflow
      POSTGRES_DB: courseflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres_init.sql:/docker-entrypoint-initdb.d/001-courseflow-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courseflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: courseflow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: courseflow-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: courseflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: courseflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-connect:
    image: debezium/connect:2.7.3.Final
    container_name: courseflow-kafka-connect
    depends_on:
      - kafka
      - postgres
    ports:
      - "18083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: courseflow-connect
      CONFIG_STORAGE_TOPIC: courseflow_connect_configs
      OFFSET_STORAGE_TOPIC: courseflow_connect_offsets
      STATUS_STORAGE_TOPIC: courseflow_connect_status
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

  debezium-course-search-setup:
    image: curlimages/curl:8.10.1
    container_name: courseflow-debezium-course-search-setup
    depends_on:
      - kafka-connect
    volumes:
      - ./debezium/course-search-cdc-connector-config.json:/connector-config.json:ro
    entrypoint:
      - /bin/sh
      - -c
      - >
        until curl -fsS http://kafka-connect:8083/connectors >/dev/null; do
          echo 'waiting for kafka-connect...'; sleep 2;
        done &&
        curl -fsS -X PUT -H 'Content-Type: application/json' --data @/connector-config.json http://kafka-connect:8083/connectors/courseflow-course-search-cdc/config &&
        echo 'Debezium connector ready: courseflow-course-search-cdc'
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: courseflow-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: courseflow-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_BASE_URL:-http://localhost:18080}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "18080:8080"
    volumes:
      - ./keycloak/courseflow-realm.json:/opt/keycloak/data/import/courseflow-realm.json:ro

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: courseflow-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: courseflow
      MINIO_ROOT_PASSWORD: courseflow
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # One-shot bootstrap: retries until MinIO is reachable, then creates the buckets the services expect.
  minio-setup:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: courseflow-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 courseflow courseflow; do
        echo 'waiting for minio...'; sleep 2;
      done &&
      mc mb --ignore-existing local/courseflow-media &&
      mc mb --ignore-existing local/courseflow-recordings &&
      mc mb --ignore-existing local/courseflow-submissions &&
      mc mb --ignore-existing local/courseflow-portfolio &&
      echo 'MinIO buckets ready: courseflow-media, courseflow-recordings, courseflow-submissions, courseflow-portfolio'
      "
    restart: "no"

volumes:
  postgres_data:
  mongo_data:
  elasticsearch_data:
  minio_data:

spring.application.name=news
server.port=${SERVER_PORT:8080}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${NEWS_DB_HOST:localhost}:${NEWS_DB_PORT:5432}/${NEWS_DB_NAME:news}
spring.datasource.username=${NEWS_DB_USERNAME:news}
spring.datasource.password=${NEWS_DB_PASSWORD:news123}

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog.xml

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# Springdoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.com.onemount.news=DEBUG

databaseChangeLog:
  - changeSet:
      id: 001-create-news-table
      author: onemount
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: news
      changes:
        - createTable:
            tableName: news
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_news
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: VARCHAR(255)
              - column:
                  name: summary
                  type: VARCHAR(1000)
              - column:
                  name: content
                  type: LONGTEXT
              - column:
                  name: author
                  type: VARCHAR(255)
              - column:
                  name: thumbnail_url
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_on
                  type: TIMESTAMP(6)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: last_modified_on
                  type: TIMESTAMP(6)
              - column:
                  name: last_modified_by
                  type: VARCHAR(255)
        - addUniqueConstraint:
            tableName: news
            columnNames: slug
            constraintName: uk_news_slug
      rollback:
        - dropTable:
            tableName: news

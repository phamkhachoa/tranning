services:
  news-postgres:
    image: postgres:16-alpine
    container_name: training-news-postgres
    environment:
      POSTGRES_DB: news
      POSTGRES_USER: news
      POSTGRES_PASSWORD: news123
    ports:
      - "5432:5432"
    volumes:
      - news-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news -d news"]
      interval: 10s
      timeout: 5s
      retries: 10

  news-redis:
    image: redis:7-alpine
    container_name: training-news-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  identity-postgres:
    image: postgres:16-alpine
    container_name: training-identity-postgres
    environment:
      POSTGRES_DB: identity_training
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity123
    ports:
      - "5433:5432"
    volumes:
      - identity-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity_training"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  news-postgres-data:
  identity-postgres-data:
